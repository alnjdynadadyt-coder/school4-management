<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير الحضور والغياب اليومية</title>
    <style>
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background-color: #fcfbf9;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .controls-box {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e1e1e1;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: white;
            transition: 0.2s;
        }
        button:hover { opacity: 0.85; }
        .btn-daily { background-color: #34495e; }
        .btn-absent { background-color: #c0392b; }
        .btn-nocheck { background-color: #d35400; }
        .btn-excel { background-color: #27ae60; }
        .btn-pdf { background-color: #2980b9; }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #ecf0f1;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
        }
        th, td {
            border: 1px solid #bdc3c7;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #34495e;
            color: white;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← العودة لوحة التحكم الرئيسية</a>
    <h2>📊 تقارير الحضور والغياب اليومية</h2>

    <div class="controls-box">
        <input type="date" id="reportDate" style="padding: 7px; border-radius: 5px; border: 1px solid #bdc3c7;" onchange="loadReportData()">
        <button class="btn-daily" onclick="loadReportData()">عرض الكل</button>
        <button class="btn-absent" onclick="filterTable('غائب')">كشف المتغيبين</button>
        <button class="btn-nocheck" onclick="filterNoCheckout()">لم يسجلوا الانصراف</button>
        <button class="btn-excel" onclick="exportToExcel()">تصدير Excel</button>
        <button class="btn-pdf" onclick="window.print()">تصدير PDF</button>
    </div>

    <div class="stats-bar" id="statsBar">
        <span id="statPresent">إجمالي الحضور: 0</span>
        <span id="statLate">المتأخرين: 0</span>
        <span id="statLeave">المجازين: 0</span>
        <span id="statAbsent">الغائبين: 0</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>الكود</th>
                <th>الاسم</th>
                <th>التصنيف</th>
                <th>وقت الحضور</th>
                <th>وقت الانصراف</th>
                <th>الحالة</th>
                <th>السبب / ملاحظات</th>
            </tr>
        </thead>
        <tbody id="reportTableBody">
            <tr><td colspan="7" style="color: #7f8c8d; padding: 20px;">جاري تحميل البيانات...</td></tr>
        </tbody>
    </table>
</div>

<script>
    document.getElementById('reportDate').valueAsDate = new Date();

    function loadReportData() {
        const selectedDate = document.getElementById('reportDate').value;
        const tbody = document.getElementById('reportTableBody');
        tbody.innerHTML = '';

        // البحث الشامل في كافة المفاتيح المحتملة للتخزين المحلي
        let records = [];
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            if (key.includes('attendance') || key.includes('record') || key.includes('Employee')) {
                try {
                    let data = JSON.parse(localStorage.getItem(key));
                    if (Array.isArray(data)) {
                        records = records.concat(data);
                    }
                } catch (e) {}
            }
        }

        // إزالة التكرارات إن وجدت
        records = Array.from(new Set(records.map(JSON.stringify))).map(JSON.parse);

        // تصفية السجلات حسب التاريخ المختار، أو جلب المتاح إذا لم يطابق التاريخ حرفياً
        let filtered = records.filter(r => r.date === selectedDate);
        if (filtered.length === 0 && records.length > 0) {
            filtered = records; // عرض المتاح لتجنب الفراغ
        }

        let presentCount = 0, lateCount = 0, leaveCount = 0, absentCount = 0;

        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="color: #7f8c8d; padding: 20px;">لا توجد سجلات حضور مسجلة لهذا التاريخ</td></tr>`;
            updateStats(0, 0, 0, 0);
            return;
        }

        filtered.forEach(rec => {
            const status = rec.status || rec.state || 'حاضر';
            if (status.includes("حاضر")) presentCount++;
            else if (status.includes("متأخر")) lateCount++;
            else if (status.includes("مجاز")) leaveCount++;
            else absentCount++;

            let color = '#27ae60';
            if (status.includes("غائب")) color = '#c0392b';
            else if (status.includes("متأخر")) color = '#d35400';

            let row = `<tr>
                <td>${rec.code || rec.id || '-'}</td>
                <td><b>${rec.name || rec.empName || 'مستخدم'}</b></td>
                <td>${rec.category || rec.job || 'موظف'}</td>
                <td>${rec.timeIn || rec.time || '-'}</td>
                <td>${rec.timeOut || '-'}</td>
                <td><span style="color: ${color}; font-weight: bold;">${status}</span></td>
                <td>${rec.note || rec.reason || '-'}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        updateStats(presentCount + lateCount, lateCount, leaveCount, absentCount);
    }

    function updateStats(present, late, leave, absent) {
        document.getElementById('statPresent').innerText = `إجمالي الحضور: ${present}`;
        document.getElementById('statLate').innerText = `المتأخرين: ${late}`;
        document.getElementById('statLeave').innerText = `المجازين: ${leave}`;
        document.getElementById('statAbsent').innerText = `الغائبين: ${absent}`;
    }

    function filterTable(type) {
        const rows = document.querySelectorAll("#reportTableBody tr");
        rows.forEach(row => {
            const statusCell = row.querySelector("td:nth-child(6)");
            if (statusCell) {
                row.style.display = statusCell.innerText.includes(type) ? "" : "none";
            }
        });
    }

    function filterNoCheckout() {
        const rows = document.querySelectorAll("#reportTableBody tr");
        rows.forEach(row => {
            const timeOutCell = row.querySelector("td:nth-child(5)");
            const statusCell = row.querySelector("td:nth-child(6)");
            if (timeOutCell && statusCell) {
                row.style.display = (timeOutCell.innerText === "-" && !statusCell.innerText.includes("غائب")) ? "" : "none";
            }
        });
    }

    function exportToExcel() {
        let table = document.querySelector("table");
        let html = table.outerHTML;
        let blob = new Blob(['\ufeff' + html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = `attendance_report_${new Date().toISOString().slice(0,10)}.xls`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    window.onload = loadReportData;
</script>

</body>
</html>
