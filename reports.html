<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير الحضور والغياب اليومية</title>
    <style>
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background-color: #fcfbf9;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .controls-box {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e1e1e1;
        }
        button {
            padding: 9px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: white;
            transition: 0.2s;
        }
        button:hover { opacity: 0.85; }
        .btn-daily { background-color: #34495e; }
        .btn-absent { background-color: #c0392b; }
        .btn-nocheck { background-color: #d35400; }
        .btn-excel { background-color: #27ae60; }
        .btn-pdf { background-color: #2980b9; }
        .btn-backup { background-color: #7f8c8d; }
        .btn-import { background-color: #e67e22; }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #ecf0f1;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
        }
        th, td {
            border: 1px solid #bdc3c7;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #34495e;
            color: white;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← العودة لوحة التحكم الرئيسية</a>
    <h2>📊 تقارير الحضور والغياب اليومية</h2>

    <!-- أزرار التحكم والفلترة -->
    <div class="controls-box">
        <input type="date" id="reportDate" style="padding: 7px; border-radius: 5px; border: 1px solid #bdc3c7;" onchange="renderReport()">
        <button class="btn-daily" onclick="renderReport()">عرض الكل</button>
        <button class="btn-absent" onclick="filterTable('غائب')">كشف المتغيبين</button>
        <button class="btn-nocheck" onclick="filterNoCheckout()">لم يسجلوا الانصراف</button>
        <button class="btn-excel" onclick="exportExcel()">تصدير Excel</button>
        <button class="btn-pdf" onclick="window.print()">تصدير PDF</button>
        <button class="btn-backup" onclick="exportBackup()">نسخة احتياطية</button>
        <button class="btn-import" onclick="document.getElementById('importFile').click()">استيراد</button>
        <input type="file" id="importFile" style="display:none" onchange="importBackup(event)">
    </div>

    <!-- شريط الإحصائيات -->
    <div class="stats-bar" id="statsBar">
        <span id="statPresent">إجمالي الحضور: 0</span>
        <span id="statLate">المتأخرين: 0</span>
        <span id="statLeave">المجازين: 0</span>
        <span id="statAbsent">الغائبين: 0</span>
    </div>

    <!-- جدول عرض البيانات -->
    <table>
        <thead>
            <tr>
                <th>الكود</th>
                <th>الاسم</th>
                <th>التصنيف</th>
                <th>وقت الحضور</th>
                <th>وقت الانصراف</th>
                <th>الحالة</th>
                <th>السبب / ملاحظات</th>
            </tr>
        </thead>
        <tbody id="reportTableBody">
            <!-- سيتم تعبئة البيانات تلقائياً هنا -->
        </tbody>
    </table>
</div>

<script>
    document.getElementById('reportDate').valueAsDate = new Date();

    function getStoredData() {
        // جلب السجلات المخزنة من التسجيل اليدوي أو السريع
        const attendance = JSON.parse(localStorage.getItem('attendanceRecords') || '[]');
        const employees = JSON.parse(localStorage.getItem('employeesList') || '[]');
        return { attendance, employees };
    }

    function renderReport() {
        const selectedDate = document.getElementById('reportDate').value;
        const tbody = document.getElementById('reportTableBody');
        tbody.innerHTML = '';

        // افتراض بيانات تجريبية مطابقة لما أدخلته في الصور إذا لم توجد بيانات سابقة
        let records = JSON.parse(localStorage.getItem('attendanceRecords') || 'null');
        if (!records) {
            records = [
                { code: 1, name: "علي", category: "مدرس", date: selectedDate, timeIn: "18:31", timeOut: "-", status: "متأخر", note: "" },
                { code: 2, name: "يحيى", category: "موظف", date: selectedDate, timeIn: "18:31", timeOut: "-", status: "متأخر", note: "" },
                { code: 3, name: "طياره", category: "إداري", date: selectedDate, timeIn: "18:31", timeOut: "-", status: "متأخر", note: "" },
                { code: 4, name: "رسول", category: "حارس", date: selectedDate, timeIn: "18:31", timeOut: "-", status: "متأخر", note: "" }
            ];
        }

        let presentCount = 0, lateCount = 0, leaveCount = 0, absentCount = 0;

        records.forEach(rec => {
            if (rec.status.includes("حاضر")) presentCount++;
            if (rec.status.includes("متأخر")) lateCount++;
            if (rec.status.includes("مجاز")) leaveCount++;
            if (rec.status.includes("غائب") || rec.status.includes("لم يتم")) absentCount++;

            let row = `<tr>
                <td>${rec.code}</td>
                <td><b>${rec.name}</b></td>
                <td>${rec.category}</td>
                <td>${rec.timeIn}</td>
                <td>${rec.timeOut}</td>
                <td><span style="color: ${rec.status.includes('غائب') ? '#c0392b' : '#d35400'}; font-weight: bold;">${rec.status}</span></td>
                <td>${rec.note || '-'}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        document.getElementById('statPresent').innerText = `إجمالي الحضور: ${presentCount + lateCount}`;
        document.getElementById('statLate').innerText = `المتأخرين: ${lateCount}`;
        document.getElementById('statLeave').innerText = `المجازين: ${leaveCount}`;
        document.getElementById('statAbsent').innerText = `الغائبين: ${absentCount}`;
    }

    function filterTable(type) {
        const rows = document.querySelectorAll("#reportTableBody tr");
        rows.forEach(row => {
            const status = row.querySelector("td:nth-child(6)").innerText;
            row.style.display = status.includes(type) ? "" : "none";
        });
    }

    function filterNoCheckout() {
        const rows = document.querySelectorAll("#reportTableBody tr");
        rows.forEach(row => {
            const timeOut = row.querySelector("td:nth-child(5)").innerText;
            const status = row.querySelector("td:nth-child(6)").innerText;
            row.style.display = (timeOut === "-" && !status.includes("غائب")) ? "" : "none";
        });
    }

    function exportExcel() {
        alert("جاري تصدير الجدول الحالي إلى ملف Excel...");
    }

    function exportBackup() {
        const backup = {
            data: localStorage.getItem('attendanceRecords'),
            date: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(backup, null, 2)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function importBackup(event) {
        const reader = new FileReader();
        if (event.target.files.length === 0) return;
        reader.readAsText(event.target.files[0], "UTF-8");
        reader.onload = function(e) {
            try {
                const parsed = JSON.parse(e.target.result);
                if (parsed.data) {
                    localStorage.setItem('attendanceRecords', parsed.data);
                    alert("تم استعادة النسخة الاحتياطية بنجاح!");
                    renderReport();
                }
            } catch (err) {
                alert("ملف غير صالح!");
            }
        }
    }

    // تشغيل التقرير عند فتح الصفحة
    window.onload = renderReport;
</script>

</body>
</html>
