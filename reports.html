<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير الحضور والغياب اليومية</title>
    <style>
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background-color: #fcfbf9;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .controls-box {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e1e1e1;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: white;
            transition: 0.2s;
        }
        button:hover { opacity: 0.85; }
        .btn-daily { background-color: #34495e; }
        .btn-absent { background-color: #c0392b; }
        .btn-nocheck { background-color: #d35400; }
        .btn-excel { background-color: #27ae60; }
        .btn-pdf { background-color: #2980b9; }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #ecf0f1;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
        }
        th, td {
            border: 1px solid #bdc3c7;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #34495e;
            color: white;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← العودة لوحة التحكم الرئيسية</a>
    <h2>📊 تقارير الحضور والغياب اليومية</h2>

    <!-- أزرار التحكم والفلترة بدون نسخ احتياطي أو استيراد -->
    <div class="controls-box">
        <input type="date" id="reportDate" style="padding: 7px; border-radius: 5px; border: 1px solid #bdc3c7;" onchange="renderReport()">
        <button class="btn-daily" onclick="renderReport()">عرض الكل</button>
        <button class="btn-absent" onclick="filterTable('غائب')">كشف المتغيبين</button>
        <button class="btn-nocheck" onclick="filterNoCheckout()">لم يسجلوا الانصراف</button>
        <button class="btn-excel" onclick="exportExcel()">تصدير Excel</button>
        <button class="btn-pdf" onclick="window.print()">تصدير PDF</button>
    </div>

    <!-- شريط الإحصائيات -->
    <div class="stats-bar" id="statsBar">
        <span id="statPresent">إجمالي الحضور: 0</span>
        <span id="statLate">المتأخرين: 0</span>
        <span id="statLeave">المجازين: 0</span>
        <span id="statAbsent">الغائبين: 0</span>
    </div>

    <!-- جدول عرض البيانات -->
    <table>
        <thead>
            <tr>
                <th>الكود</th>
                <th>الاسم</th>
                <th>التصنيف</th>
                <th>وقت الحضور</th>
                <th>وقت الانصراف</th>
                <th>الحالة</th>
                <th>السبب / ملاحظات</th>
            </tr>
        </thead>
        <tbody id="reportTableBody">
            <!-- البيانات -->
        </tbody>
    </table>
</div>

<script>
    document.getElementById('reportDate').valueAsDate = new Date();

    function renderReport() {
        const selectedDate = document.getElementById('reportDate').value;
        const tbody = document.getElementById('reportTableBody');
        tbody.innerHTML = '';

        // جلب قائمة الموظفين الأساسية وسجلات الحضور
        const employees = JSON.parse(localStorage.getItem('employees') || localStorage.getItem('employeesList') || '[]');
        const attendance = JSON.parse(localStorage.getItem('attendanceRecords') || localStorage.getItem('attendance') || '[]');

        let presentCount = 0, lateCount = 0, leaveCount = 0, absentCount = 0;

        if (employees.length === 0 && attendance.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="color: #7f8c8d; padding: 20px;">لا توجد بيانات مسجلة في النظام حالياً</td></tr>`;
            return;
        }

        // دمج الموظفين مع سجلات الحضور الخاصة بالتاريخ المحدد
        let displayList = [];

        if (employees.length > 0) {
            employees.forEach(emp => {
                const record = attendance.find(a => (a.code == emp.code || a.name == emp.name) && a.date === selectedDate);
                if (record) {
                    displayList.push(record);
                } else {
                    // إذا لم يتم تسجيله في هذا اليوم يعتبر غائباً افتراضياً أو لم يسجل
                    displayList.push({
                        code: emp.code || '-',
                        name: emp.name,
                        category: emp.category || emp.job || 'موظف',
                        timeIn: '-',
                        timeOut: '-',
                        status: 'غائب',
                        note: 'لم يتم تسجيل الحضور'
                    });
                }
            });
        } else {
            // إذا وُجدت سجلات حضور مباشرة بدون قائمة موظفين منفصلة
            displayList = attendance.filter(a => a.date === selectedDate);
        }

        if (displayList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="color: #7f8c8d; padding: 20px;">لا توجد سجلات لهذا التاريخ</td></tr>`;
            return;
        }

        displayList.forEach(rec => {
            const status = rec.status || 'غائب';
            if (status.includes("حاضر")) presentCount++;
            else if (status.includes("متأخر")) lateCount++;
            else if (status.includes("مجاز")) leaveCount++;
            else absentCount++;

            let statusColor = '#27ae60';
            if (status.includes("غائب") || status.includes("لم يتم")) statusColor = '#c0392b';
            else if (status.includes("متأخر")) statusColor = '#d35400';

            let row = `<tr>
                <td>${rec.code || '-'}</td>
                <td><b>${rec.name || 'مستخدم'}</b></td>
                <td>${rec.category || 'موظف'}</td>
                <td>${rec.timeIn || '-'}</td>
                <td>${rec.timeOut || '-'}</td>
                <td><span style="color: ${statusColor}; font-weight: bold;">${status}</span></td>
                <td>${rec.note || rec.reason || '-'}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        document.getElementById('statPresent').innerText = `إجمالي الحضور: ${presentCount + lateCount}`;
        document.getElementById('statLate').innerText = `المتأخرين: ${lateCount}`;
        document.getElementById('statLeave').innerText = `المجازين: ${leaveCount}`;
        document.getElementById('statAbsent').innerText = `الغائبين: ${absentCount}`;
    }

    function filterTable(type) {
        const rows = document.querySelectorAll("#reportTableBody tr");
        rows.forEach(row => {
            const statusCell = row.querySelector("td:nth-child(6)");
            if (statusCell) {
                row.style.display = statusCell.innerText.includes(type) ? "" : "none";
            }
        });
    }

    function filterNoCheckout() {
        const rows = document.querySelectorAll("#reportTableBody tr");
        rows.forEach(row => {
            const timeOutCell = row.querySelector("td:nth-child(5)");
            const statusCell = row.querySelector("td:nth-child(6)");
            if (timeOutCell && statusCell) {
                row.style.display = (timeOutCell.innerText === "-" && !statusCell.innerText.includes("غائب")) ? "" : "none";
            }
        });
    }

    function exportExcel() {
        alert("جاري تصدير الجدول إلى ملف Excel...");
    }

    window.onload = renderReport;
</script>

</body>
</html>
