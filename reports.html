<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الدرجات - النسخة الذهبية 2</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 12px; }
        .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; align-items: center; }
        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { border: 1px solid #ddd; padding: 3px; text-align: center; }
        th:first-child, td:first-child { min-width: 130px; text-align: right; }
        
        .c-f1 { background-color: #fff9c4 !important; } 
        .c-mid { background-color: #e8f5e9 !important; } 
        .c-f2 { background-color: #e3f2fd !important; } 
        .c-final { background-color: #fce4ec !important; }

        .c-f1 input, .c-mid input, .c-f2 input, .c-final input { 
            width: 32px !important; 
            padding: 2px; 
            border: 1px solid #ddd; 
            border-radius: 3px; 
            text-align: center; 
            background: transparent; 
        }
        
        .fail { color: red !important; font-weight: bold; }
        .pass { color: black !important; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }

        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            body { background: white; font-size: 9px; }
            .btn, button { display: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginArea" style="text-align: center; padding: 20px;">
            <h3>تسجيل الدخول</h3>
            <input type="text" id="loginUser" placeholder="اسم المستخدم">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
            <button onclick="checkAuth()">دخول</button>
        </div>
        
        <div id="mainContent" style="display: none;">
            <button class="btn" style="background:#6c757d;" onclick="window.history.back()">🔙 العودة</button>
            <div class="controls">
                <input type="text" id="teacherName" placeholder="اسم المدرس" required>
                <select id="gClass"><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option><option>الرابع الأدبي</option><option>الخامس الأدبي</option><option>السادس الأدبي</option></select>
                <select id="gSection"><option>أ</option><option>ب</option><option>ج</option><option>د</option><option>هـ</option><option>و</option><option>ز</option></select>
                <input type="text" id="subject" placeholder="اسم المادة" list="subs" required>
                <datalist id="subs">
                    <option value="الإسلامية"><option value="العربي"><option value="الإنكليزي"><option value="الرياضيات"><option value="الفيزياء"><option value="الكيمياء"><option value="الأحياء"><option value="التاريخ"><option value="الجغرافية"><option value="الاقتصاد"><option value="علم النفس"><option value="الحاسوب"><option value="الاجتماع"><option value="الجرائم"><option value="الرياضة"><option value="الفنية">
                </datalist>
                <button class="btn" style="background:#007bff;" onclick="loadGrades()">جلب الطلاب</button>
                <button class="btn" style="background:#28a745;" onclick="exportExcel()">تصدير Excel</button>
                <button class="btn" style="background:#dc3545;" onclick="printArabic()">طباعة PDF</button>
            </div>
            <table id="gradesTable">
                <thead id="headArea"></thead>
                <tbody id="gradesBody"></tbody>
            </table>
            <button class="btn" style="width:100%; background:#007bff; margin-top:15px;" onclick="saveGrades()">حفظ الدرجات</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function checkAuth() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;

            if (user === "مدير" && pass === "123") {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('teacherName').value = "مدير";
                return;
            }

            try {
                const snapshot = await db.collection("teachers_permissions").where("name", "==", user).where("password", "==", pass).get();
                if (!snapshot.empty) {
                    document.getElementById('loginArea').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    document.getElementById('teacherName').value = user;
                    document.getElementById('teacherName').readOnly = true;

                    const gClass = document.getElementById('gClass');
                    const gSection = document.getElementById('gSection');
                    const subjectInput = document.getElementById('subject');
                    gClass.innerHTML = ""; gSection.innerHTML = "";
                    let classes = new Set(); let sections = new Set(); let subjects = new Set();

                    snapshot.forEach(doc => {
                        let data = doc.data();
                        classes.add(data.class);
                        sections.add(data.section);
                        subjects.add(data.subject);
                    });
                    classes.forEach(c => gClass.innerHTML += `<option value="${c}">${c}</option>`);
                    sections.forEach(s => gSection.innerHTML += `<option value="${s}">${s}</option>`);
                    subjectInput.value = Array.from(subjects).join(", ");
                    subjectInput.readOnly = true;
                } else { alert("اسم المستخدم أو كلمة المرور غير صحيحة!"); }
            } catch (error) { alert("خطأ: " + error.message); }
        }

        function validateInputs() {
            if(!document.getElementById('subject').value) { alert("يرجى إدخال المادة أولاً!"); return false; } return true;
        }

        async function saveGrades() {
            if(!validateInputs()) return;
            const cls = document.getElementById('gClass').value, sec = document.getElementById('gSection').value, sub = document.getElementById('subject').value;
            const docRef = db.collection("grades").doc(`${cls}_${sec}_${sub}`);
            const doc = await docRef.get();
            if (doc.exists) { const pass = prompt("أدخل كلمة المرور للتعديل:"); if (pass !== "123") { alert("كلمة مرور خاطئة!"); return; } }
            const rows = document.querySelectorAll('#gradesBody tr');
            const dataToSave = { teacher: document.getElementById('teacherName').value };
            rows.forEach((row) => { dataToSave[row.cells[0].innerText] = Array.from(row.querySelectorAll('input')).map(i => i.value); });
            await docRef.set(dataToSave); alert("تم الحفظ بنجاح!");
        }

        function getVal(v) { 
            if (v === "غ" || v === "G" || v === "٠" || v === "0") return 0;
            let clean = v.toString().replace(/[٠-٩]/g, d => "0123456789".indexOf(d));
            return parseFloat(clean) || 0; 
        }

        function checkFail(input, index) {
            const sub = document.getElementById('subject').value;
            const val = getVal(input.value);
            if (input.value === "غ") { input.style.color = "red"; input.style.fontWeight = "bold"; } 
            else { input.style.color = ""; input.style.fontWeight = ""; }
            if (sub === "الإنكليزي" || sub === "الحاسوب") { const excluded = [0, 1, 2, 3, 8, 9, 10, 11]; if (excluded.includes(index)) { input.classList.remove('fail'); return; } }
            if (input.value !== "" && input.value !== "غ" && val <= 49) { input.classList.add('fail'); } else { input.classList.remove('fail'); }
        }

        function calculate(row) {
            const sub = document.getElementById('subject').value;
            const i = row.querySelectorAll('input');
            if (sub === "الإنكليزي" || sub === "الحاسوب") {
                i[4].value = (i[0].value && i[1].value) ? (getVal(i[0].value) + getVal(i[1].value)) : "";
                i[5].value = (i[2].value && i[3].value) ? (getVal(i[2].value) + getVal(i[3].value)) : "";
                i[6].value = (i[4].value !== "" && i[5].value !== "") ? Math.round((getVal(i[4].value) + getVal(i[5].value)) / 2) : "";
                i[12].value = (i[8].value && i[9].value) ? (getVal(i[8].value) + getVal(i[9].value)) : "";
                i[13].value = (i[10].value && i[11].value) ? (getVal(i[10].value) + getVal(i[11].value)) : "";
                i[14].value = (i[12].value !== "" && i[13].value !== "") ? Math.round((getVal(i[12].value) + getVal(i[13].value)) / 2) : "";
                i[15].value = (i[6].value !== "" && i[7].value !== "" && i[14].value !== "") ? Math.round((getVal(i[6].value) + getVal(i[7].value) + getVal(i[14].value)) / 3) : "";
            } else {
                if (i[0].value !== "" && i[1].value !== "") i[2].value = Math.round((getVal(i[0].value) + getVal(i[1].value)) / 2); else i[2].value = "";
                if (i[2].value !== "" && i[3].value !== "") i[4].value = Math.round((getVal(i[2].value) + getVal(i[3].value)) / 2); else i[4].value = "";
                if (i[6].value !== "" && i[7].value !== "") i[8].value = Math.round((getVal(i[6].value) + getVal(i[7].value)) / 2); else i[8].value = "";
                if (i[8].value !== "" && i[9].value !== "") i[10].value = Math.round((getVal(i[8].value) + getVal(i[9].value)) / 2); else i[10].value = "";
                if (i[4].value !== "" && i[5].value !== "" && i[10].value !== "") i[11].value = Math.round((getVal(i[4].value) + getVal(i[5].value) + getVal(i[10].value)) / 3); else i[11].value = "";
            }
            i.forEach((input, idx) => checkFail(input, idx));
        }

        function loadGrades() {
            if(!validateInputs()) return;
            const sub = document.getElementById('subject').value;
            const head = document.getElementById('headArea');
            const body = document.getElementById('gradesBody'); body.innerHTML = "";
            const cls = document.getElementById('gClass').value, sec = document.getElementById('gSection').value;
            const currentUser = document.getElementById('teacherName').value;

            if (sub === "الإنكليزي" || sub === "الحاسوب") {
                head.innerHTML = `<tr><th>الطالب</th><th colspan="7" class="c-f1">الفصل الأول</th><th class="c-mid">ن.سنة</th><th colspan="7" class="c-f2">الفصل الثاني</th><th class="c-final">السعي</th></tr><tr><th></th><th>ش1</th><th>يومي</th><th>ش2</th><th>يومي</th><th>مج.ش1</th><th>مج.ش2</th><th>فصل1</th><th>ن.سنة</th><th>ش1</th><th>يومي</th><th>ش2</th><th>يومي</th><th>مج.ش1</th><th>مج.ش2</th><th>فصل2</th><th>السعي</th></tr>`;
            } else {
                head.innerHTML = `<tr><th>الطالب</th><th colspan="5" class="c-f1">الفصل الأول</th><th class="c-mid">نصف السنة</th><th colspan="5" class="c-f2">الفصل الثاني</th><th class="c-final">السعي</th></tr><tr><th></th><th class="c-f1">ش1</th><th class="c-f1">ش2</th><th class="c-f1">م.ش</th><th class="c-f1">يومي1</th><th class="c-f1">فصل1</th><th class="c-mid">ن.سنة</th><th class="c-f2">ش1</th><th class="c-f2">ش2</th><th class="c-f2">م.ش</th><th class="c-f2">يومي2</th><th class="c-f2">فصل2</th><th class="c-final">النتيجة</th></tr>`;
            }
            db.collection("students").where("class", "==", cls).get().then(snap => {
                let students = []; snap.forEach(s => { if(s.data().section == sec) students.push(s.data()); });
                students.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
                students.forEach(s => {
                    const classes = (sub === "الإنكليزي" || sub === "الحاسوب") ? ["c-f1","c-f1","c-f1","c-f1","c-f1","c-f1","c-f1","c-mid","c-f2","c-f2","c-f2","c-f2","c-f2","c-f2","c-f2","c-final"] : ["c-f1","c-f1","c-f1","c-f1","c-f1","c-mid","c-f2","c-f2","c-f2","c-f2","c-f2","c-final"];
                    let row = `<tr><td>${s.name}</td>`;
                    classes.forEach((c, idx) => { row += `<td class="${c}"><input type="text" style="width: 32px !important; text-align: center;" oninput="calculate(this.parentElement.parentElement); checkFail(this, ${idx})"></td>`; });
                    body.innerHTML += row + "</tr>";
                });
                db.collection("grades").doc(`${cls}_${sec}_${sub}`).get().then(doc => {
                    if (doc.exists) {
                        const data = doc.data(); 
                        if (currentUser !== "مدير") document.getElementById('teacherName').value = data.teacher;
                        document.querySelectorAll('#gradesBody tr').forEach(row => {
                            const name = row.cells[0].innerText;
                            if (data[name]) { 
                                const inputs = row.querySelectorAll('input'); 
                                data[name].forEach((val, i) => { 
                                    inputs[i].value = val; 
                                    // قفل الدرجات للمدرس فقط
                                    if(val !== "" && currentUser !== "مدير") {
                                        inputs[i].readOnly = true;
                                        inputs[i].style.backgroundColor = "#e0e0e0";
                                    }
                                    checkFail(inputs[i], i); 
                                }); 
                            }
                        });
                    }
                });
            });
        }

        function printArabic() {
            const inputs = document.querySelectorAll('#gradesBody input');
            inputs.forEach(i => { if(i.value) i.dataset.original = i.value; i.value = i.value.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]); });
            window.print();
            setTimeout(() => { inputs.forEach(i => { if(i.dataset.original) i.value = i.dataset.original; }); }, 1000);
        }

        function exportExcel() {
            const cls = document.getElementById('gClass').value, sec = document.getElementById('gSection').value, sub = document.getElementById('subject').value, teacher = document.getElementById('teacherName').value;
            const toArabic = (num) => num.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
            const infoData = [["نظام إدارة الدرجات"], ["اسم المدرس:", teacher], ["المادة:", sub], ["الصف:", cls], ["الشعبة:", sec]];
            const headers = (sub === "الإنكليزي" || sub === "الحاسوب") ? ["الطالب", "ش1", "يومي", "ش2", "يومي", "مج.ش1", "مج.ش2", "فصل1", "ن.سنة", "ش1", "يومي", "ش2", "يومي", "مج.ش1", "مج.ش2", "فصل2", "السعي"] : ["الطالب", "ش1", "ش2", "م.ش", "يومي1", "فصل1", "ن.سنة", "ش1", "ش2", "م.ش", "يومي2", "فصل2", "السعي"];
            const tableData = [headers];
            document.querySelectorAll('#gradesBody tr').forEach(row => { const rowData = [row.cells[0].innerText]; row.querySelectorAll('input').forEach(i => rowData.push(toArabic(i.value))); tableData.push(rowData); });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(infoData), "معلومات");
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(tableData), "الدرجات");
            XLSX.writeFile(wb, `الدرجات_${cls}_${sec}_${sub}.xlsx`);
        }
    </script>
</body>
</html>
