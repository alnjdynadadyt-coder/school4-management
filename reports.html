<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التقارير الشاملة - اعدادية النجدين</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; background: #fff3cd; padding: 15px; border-radius: 8px; align-items: center; }
        input, button { padding: 10px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #ffc107; color: #333; }
        .back-link { display: inline-block; margin-bottom: 15px; color: #007bff; text-decoration: none; font-weight: bold; }
        .stats { display: flex; gap: 15px; margin-bottom: 15px; font-weight: bold; justify-content: space-around; background: #f8f9fa; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← العودة لوحة التحكم الرئيسية</a>
    <h2 style="color:#d39e00; text-align:center;">📊 تقارير الحضور والغياب اليومية</h2>
    
    <div class="input-group">
        <label>اختر تاريخ التقرير:</label>
        <input type="date" id="reportDate" onchange="generateReport()">
        <button onclick="generateReport()" style="background:#ffc107; font-weight:bold; border:none;">عرض التقرير</button>
    </div>

    <div class="stats" id="statsBox">
        <span>إجمالي الحضور: <span id="countPresent">0</span></span>
        <span>إجمالي المتأخرين: <span id="countLate">0</span></span>
        <span>إجمالي المجازين: <span id="countLeave">0</span></span>
        <span>إجمالي الغائبين: <span id="countAbsent">0</span></span>
    </div>

    <table>
        <thead>
            <tr><th>الكود</th><th>الاسم</th><th>التصنيف</th><th>وقت الحضور</th><th>وقت الانصراف</th><th>الحالة</th><th>السبب / ملاحظات</th></tr>
        </thead>
        <tbody id="reportTable"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyCfJ5wGmw2BUZbTfPXILVOYjdQQYdDb0VQ",
        authDomain: "school4-management.firebaseapp.com",
        projectId: "school4-management",
        storageBucket: "school4-management.firebasestorage.app",
        messagingSenderId: "157481747196",
        appId: "1:157481747196:web:ee4958d9589b8d01464d79",
        measurementId: "G-G89TZ8CC7Y"
    }));

    document.getElementById('reportDate').valueAsDate = new Date();

    window.generateReport = async () => {
        const date = document.getElementById('reportDate').value;
        
        // 1. جلب كل الموظفين الأساسيين
        const empSnap = await getDocs(collection(db, "employees"));
        let employees = {};
        empSnap.forEach(d => { employees[d.id] = { id: d.id, ...d.data() }; });

        // 2. جلب الحضور المسجل لهذا اليوم
        const attQuery = query(collection(db, "attendance"), where("date", "==", date));
        const attSnap = await getDocs(attQuery);
        let attendanceMap = {};
        attSnap.forEach(d => { 
            let data = d.data();
            attendanceMap[data.empCode] = data; 
        });

        let rows = "";
        let pCount = 0, lCount = 0, lvCount = 0, aCount = 0;

        // 3. مطابقة الموظفين مع حالة الحضور أو اعتبارهم غائبين افتراضياً
        for (let code in employees) {
            let emp = employees[code];
            let record = attendanceMap[code];
            
            let status = "غائب";
            let time = "-";
            let exitTime = "-";
            let reason = "لم يتم تسجيل الحضور";

            if (record) {
                status = record.status;
                time = record.time || "-";
                exitTime = record.exitTime || "-";
                reason = record.reason || "";
            }

            if (status === "حاضر") pCount++;
            else if (status === "متأخر") lCount++;
            else if (status === "مجاز") lvCount++;
            else aCount++;

            rows += `<tr>
                <td>${emp.id}</td>
                <td style="font-weight:bold;">${emp.name}</td>
                <td>${emp.type}</td>
                <td>${time}</td>
                <td>${exitTime}</td>
                <td style="font-weight:bold; color: ${status==='حاضر'?'green':status==='متأخر'?'orange':status==='مجاز'?'blue':'red'};">${status}</td>
                <td>${reason}</td>
            </tr>`;
        }

        document.getElementById('reportTable').innerHTML = rows;
        document.getElementById('countPresent').innerText = pCount;
        document.getElementById('countLate').innerText = lCount;
        document.getElementById('countLeave').innerText = lvCount;
        document.getElementById('countAbsent').innerText = aCount;
    };

    generateReport();
</script>
</body>
</html>
